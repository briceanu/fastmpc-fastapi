version: "3.9"

services:
  mcp_server:
    container_name: mcp-server-rag-2
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run fastmcp run ./app/mcp_server.py:mcp --transport http --port 9000 --host 0.0.0.0
    volumes:
      - ./app:/app/app
    ports:
      - "9000:9000"
    env_file: .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PYTHONPATH: /app

  fast_api:
    container_name: agentic-rag-2
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - postgres
      - redis
      - mcp_server
    env_file: .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: postgres

  celery:
    container_name: celery-rag-2
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run celery -A app.celery_tasks worker --loglevel=INFO
    volumes:
      - ./app:/app/app
    depends_on:
      - redis
      - postgres
    env_file: .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: postgres

  postgres:
    container_name: agentic-postgres-2
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    container_name: redis-rag-2
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

volumes:
  pg_data:
